<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-sclae=1">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>
    <link href="{{url_for('static', filename='styles.css')}}" rel="stylesheet">
  </head>

  <body class="d-flex flex-column min-vh-100 bg-dark text-white">
    <header style="text-align: center; font-size: 20px">Subscriptions Tracker</header>
    <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom border-secondary">
      <div class="container-fluid">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
          aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href={{ url_for("main.index") }}>Home</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="/login">Log In</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register">Register</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    <header>
      <div class="alert alert-primary border text-center" role="alert">
        {{ messages | join(" ") }}
      </div>
    </header>
    {% endif %}
    {% endwith %}
    <main class="container py-5 text-center flex-grow-1">
      {% block main %}{% endblock %}
    </main>
    <footer class="text-center py-3">Copyrights 2026</footer>
    <script>
      src = "{{url_for('static', filename='script.js')}}"
    </script>
  </body>

</html>
